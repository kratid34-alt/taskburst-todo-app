<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✨ TaskBurst – My Todo App</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink:   #FF6B9D;
    --yellow: #FFD93D;
    --green:  #6BCB77;
    --blue:   #4D96FF;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --bg:     #FFF8F0;
    --card:   #FFFFFF;
    --text:   #2D2D2D;
    --muted:  #999;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating blobs background */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: var(--pink);
    top: -100px; left: -100px;
    animation: floatA 8s ease-in-out infinite;
  }
  body::after {
    width: 350px; height: 350px;
    background: var(--blue);
    bottom: -80px; right: -80px;
    animation: floatB 10s ease-in-out infinite;
  }

  @keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

  .wrapper {
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .header p {
    color: var(--muted);
    font-size: .95rem;
    margin-top: 6px;
    font-weight: 600;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    animation: popIn .7s cubic-bezier(.34,1.56,.64,1) .1s both;
  }
  .stat {
    flex: 1;
    background: var(--card);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.07);
    border: 2.5px solid transparent;
    transition: transform .2s;
  }
  .stat:hover { transform: translateY(-3px); }
  .stat:nth-child(1) { border-color: var(--pink); }
  .stat:nth-child(2) { border-color: var(--green); }
  .stat:nth-child(3) { border-color: var(--yellow); }
  .stat .num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    line-height: 1;
  }
  .stat:nth-child(1) .num { color: var(--pink); }
  .stat:nth-child(2) .num { color: var(--green); }
  .stat:nth-child(3) .num { color: var(--orange); }
  .stat .label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }

  /* Input area */
  .input-card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,.08);
    margin-bottom: 24px;
    animation: popIn .7s cubic-bezier(.34,1.56,.64,1) .2s both;
    border: 2.5px solid rgba(255,107,157,.2);
  }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .input-row input {
    flex: 1;
    border: 2.5px solid #EEE;
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    background: #FAFAFA;
    color: var(--text);
  }
  .input-row input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 4px rgba(255,107,157,.15);
    background: #FFF;
  }
  .input-row input::placeholder { color: #CCC; font-weight: 600; }
  .add-btn {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #FFF;
    border: none;
    border-radius: 14px;
    padding: 12px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 14px rgba(255,107,157,.4);
    white-space: nowrap;
  }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,157,.5); }
  .add-btn:active { transform: scale(.96); }

  /* Category + Priority row */
  .options-row {
    display: flex;
    gap: 10px;
  }
  .options-row select {
    flex: 1;
    border: 2.5px solid #EEE;
    border-radius: 12px;
    padding: 9px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    background: #FAFAFA;
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  .options-row select:focus { border-color: var(--purple); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: popIn .7s cubic-bezier(.34,1.56,.64,1) .3s both;
  }
  .filter-btn {
    border: none;
    border-radius: 24px;
    padding: 8px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
    background: #EEE;
    color: #888;
  }
  .filter-btn.active {
    color: #FFF;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    transform: translateY(-2px);
  }
  .filter-btn[data-filter="all"].active    { background: linear-gradient(135deg, var(--blue), var(--purple)); }
  .filter-btn[data-filter="active"].active { background: linear-gradient(135deg, var(--pink), var(--orange)); }
  .filter-btn[data-filter="done"].active   { background: linear-gradient(135deg, var(--green), var(--blue)); }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 12px; }

  .task-item {
    background: var(--card);
    border-radius: 18px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.07);
    border-left: 5px solid var(--pink);
    transition: transform .2s, opacity .3s;
    animation: slideIn .4s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0), rgba(255,255,255,.5));
    pointer-events: none;
  }
  .task-item:hover { transform: translateX(4px); }
  .task-item.done {
    opacity: .65;
    border-left-color: var(--green);
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  /* Priority colors */
  .task-item[data-priority="high"]   { border-left-color: var(--pink); }
  .task-item[data-priority="medium"] { border-left-color: var(--yellow); }
  .task-item[data-priority="low"]    { border-left-color: var(--green); }

  /* Custom checkbox */
  .check-wrap { position: relative; flex-shrink: 0; }
  .check-wrap input[type=checkbox] { display: none; }
  .check-wrap label {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 2.5px solid #DDD;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s;
    font-size: 14px;
    background: #FAFAFA;
  }
  .check-wrap input:checked + label {
    background: linear-gradient(135deg, var(--green), var(--blue));
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(107,203,119,.4);
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-weight: 700;
    font-size: .95rem;
    color: var(--text);
    word-break: break-word;
  }
  .task-meta {
    display: flex;
    gap: 6px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: .68rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .cat-work     { background: #E8F4FF; color: var(--blue); }
  .cat-personal { background: #FFF0F6; color: var(--pink); }
  .cat-study    { background: #F3ECFF; color: var(--purple); }
  .cat-health   { background: #EDFFF0; color: var(--green); }
  .pri-high     { background: #FFE8EE; color: var(--pink); }
  .pri-medium   { background: #FFF8E0; color: var(--orange); }
  .pri-low      { background: #EDFFF0; color: var(--green); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    flex-shrink: 0;
    padding: 4px;
  }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { transform: scale(1.2); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    animation: popIn .5s ease both;
  }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-weight: 700; font-size: 1rem; }
  .empty small { font-size: .82rem; }

  /* Clear done button */
  .bottom-bar {
    text-align: center;
    margin-top: 24px;
  }
  .clear-btn {
    background: none;
    border: 2.5px solid #EEE;
    border-radius: 24px;
    padding: 9px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .clear-btn:hover {
    border-color: var(--pink);
    color: var(--pink);
    transform: translateY(-2px);
  }

  /* Confetti burst */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), 200px) rotate(720deg); opacity: 0; }
  }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(.85) translateY(12px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes slideIn {
    0%   { opacity: 0; transform: translateX(-20px); }
    100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <h1>✨ TaskBurst!</h1>
    <p>Apne tasks ko dhamaka kar do 🚀</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="num" id="stat-total">0</div>
      <div class="label">Total</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-done">0</div>
      <div class="label">Done ✅</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-left">0</div>
      <div class="label">Baki hai</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Kya karna hai aaj? 🤔" maxlength="120" />
      <button class="add-btn" onclick="addTask()">Add ✦</button>
    </div>
    <div class="options-row">
      <select id="cat-select">
        <option value="personal">👤 Personal</option>
        <option value="work">💼 Work</option>
        <option value="study">📚 Study</option>
        <option value="health">💪 Health</option>
      </select>
      <select id="pri-select">
        <option value="medium">🟡 Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">🌈 Sab</button>
    <button class="filter-btn"        data-filter="active" onclick="setFilter('active')">🔥 Karna Hai</button>
    <button class="filter-btn"        data-filter="done"   onclick="setFilter('done')">✅ Ho Gaya</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="task-list"></div>

  <!-- Bottom -->
  <div class="bottom-bar">
    <button class="clear-btn" onclick="clearDone()">🗑️ Done wale hata do</button>
  </div>
</div>

<script>
  const COLORS = ['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9A3C'];
  let tasks = JSON.parse(localStorage.getItem('taskburst') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('taskburst', JSON.stringify(tasks)); }

  function render() {
    const list = document.getElementById('task-list');
    const filtered = tasks.filter(t =>
      filter === 'all' ? true : filter === 'done' ? t.done : !t.done
    );

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="emoji">${filter === 'done' ? '🎉' : '🌟'}</div>
          <p>${filter === 'done' ? 'Abhi kuch complete nahi hua' : 'Koi task nahi hai!'}</p>
          <small>${filter === 'all' ? 'Upar se kuch add karo 👆' : ''}</small>
        </div>`;
    } else {
      list.innerHTML = filtered.map((t,i) => `
        <div class="task-item ${t.done ? 'done' : ''}" data-priority="${t.priority}" style="animation-delay:${i*0.05}s">
          <div class="check-wrap">
            <input type="checkbox" id="chk-${t.id}" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}', event)" />
            <label for="chk-${t.id}">${t.done ? '✓' : ''}</label>
          </div>
          <div class="task-body">
            <div class="task-text">${escHtml(t.text)}</div>
            <div class="task-meta">
              <span class="tag cat-${t.category}">${catLabel(t.category)}</span>
              <span class="tag pri-${t.priority}">${priLabel(t.priority)}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
        </div>
      `).join('');
    }

    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-left').textContent  = total - done;
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text  = input.value.trim();
    if (!text) { input.focus(); input.style.borderColor = '#FF6B9D'; setTimeout(()=>input.style.borderColor='', 800); return; }
    tasks.unshift({
      id: Date.now().toString(),
      text,
      category: document.getElementById('cat-select').value,
      priority:  document.getElementById('pri-select').value,
      done: false
    });
    input.value = '';
    save(); render();
  }

  function toggle(id, e) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    if (t.done) burst(e.target);
    save(); render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  function burst(el) {
    const rect = el.getBoundingClientRect();
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `
        left:${rect.left + rect.width/2}px;
        top:${rect.top}px;
        background:${COLORS[i % COLORS.length]};
        --dx:${(Math.random()-0.5)*120}px;
        animation-duration:${.6+Math.random()*.6}s;
        border-radius:${Math.random()>0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  function catLabel(c) { return {personal:'👤 Personal', work:'💼 Work', study:'📚 Study', health:'💪 Health'}[c] || c; }
  function priLabel(p) { return {high:'🔴 High', medium:'🟡 Medium', low:'🟢 Low'}[p] || p; }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Enter key
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  render();
</script>
</body>
</html>
